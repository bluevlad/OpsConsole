# OpsConsole — local dev compose (hot reload)
# 백엔드: uvicorn --reload, 프런트: vite dev server
version: "3.9"

services:
  opsconsole-backend:
    image: python:3.11-slim
    container_name: opsconsole-backend-dev
    working_dir: /app
    env_file: .env
    environment:
      APP_ENV: dev
      APP_DEBUG: "true"
    volumes:
      - ./backend:/app
    command: >
      sh -c "pip install -r requirements.txt &&
             uvicorn app.main:app --host 0.0.0.0 --port 9100 --reload"
    ports:
      - "9100:9100"

  opsconsole-frontend:
    image: node:20-alpine
    container_name: opsconsole-frontend-dev
    working_dir: /app
    environment:
      VITE_API_BASE_URL: http://localhost:9100
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - "4100:4100"
    depends_on:
      - opsconsole-backend
