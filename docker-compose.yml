# OpsConsole — production / staging compose
# 공유 PostgreSQL(database-services/docker-compose.yml의 'postgresql' 컨테이너)에 연결.
# 네트워크: 'database-network' (postgresql/pgadmin/mongodb와 같은 네트워크)
# DATABASE_URL은 .env에서 주입 (호스트는 'postgresql' 컨테이너명).
version: "3.9"

services:
  opsconsole-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: opsconsole-backend:latest
    container_name: opsconsole-backend
    restart: unless-stopped
    env_file: .env
    environment:
      APP_ENV: ${APP_ENV:-prod}
    ports:
      - "9100:9100"
    networks:
      - database-network

  opsconsole-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: opsconsole-frontend:latest
    container_name: opsconsole-frontend
    restart: unless-stopped
    depends_on:
      - opsconsole-backend
    ports:
      - "4100:4100"
    networks:
      - database-network

networks:
  database-network:
    external: true
