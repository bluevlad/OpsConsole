name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 18 * * 1"  # 매주 월요일 03:00 KST (Mon 18:00 UTC)

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: gitleaks (commit history secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pip-audit:
    name: pip-audit (Python deps CVE)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit backend
        run: pip-audit --requirement backend/requirements.txt --strict || true
        # 'true' — 알려진 CVE 발견 시 경고만 기록 (PR 차단 X). 정책상 차단으로 전환 가능.

  npm-audit-frontend:
    name: npm audit (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package.json
      - working-directory: frontend
        run: npm install --no-audit --no-fund
      - working-directory: frontend
        run: npm audit --omit=dev --audit-level=high || true

  npm-audit-tray:
    name: npm audit (tray)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tray/package.json
      - working-directory: tray
        run: npm install --no-audit --no-fund
      - working-directory: tray
        run: npm audit --omit=dev --audit-level=high || true

  bandit:
    name: bandit (Python static security)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install bandit[toml]
      - run: bandit -r backend/app -ll -f txt || true
